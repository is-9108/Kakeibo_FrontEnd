name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Set appsettings from environment (GitHub Secrets)
        env:
          KAKEIBO_API_BASE_URL: ${{ secrets.KAKEIBO_API_BASE_URL }}
          KAKEIBO_API_FUNCTION_KEY: ${{ secrets.KAKEIBO_API_FUNCTION_KEY }}
        run: |
          python3 -c "
          import json, os, urllib.parse
          path = 'wwwroot/appsettings.json'
          base_url = os.environ.get('KAKEIBO_API_BASE_URL', '')
          function_key = os.environ.get('KAKEIBO_API_FUNCTION_KEY', '')
          if function_key:
              function_key = urllib.parse.unquote(function_key)
          data = {
            'KakeiboApi': {
              'BaseUrl': base_url,
              'FunctionKey': function_key
            }
          }
          os.makedirs(os.path.dirname(path), exist_ok=True)
          with open(path, 'w', encoding='utf-8') as f:
            json.dump(data, f, indent=2, ensure_ascii=False)
          "
      - name: Publish Blazor WASM
        run: dotnet publish -c Release
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_KIND_ISLAND_0CFAA8900 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "bin/Release/net8.0/publish/wwwroot"
          skip_app_build: true
          api_location: ""
          output_location: ""

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_KIND_ISLAND_0CFAA8900 }}
          action: "close"
